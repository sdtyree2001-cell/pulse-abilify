name: Pulse Intelligence

on:
  schedule:
    - cron: '0 13 * * *'
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        type: choice
        options:
          - daily
          - breaking
          - test

jobs:
  pulse-daily-brief:
    if: github.event_name == 'schedule' && contains(github.event.schedule, '0 13 * * *') || github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run daily brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py --daily

      - name: Upload daily HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulse-daily-brief-html
          path: /tmp/pulse_brief_*.html
          retention-days: 7

  pulse-breaking-news:
    if: github.event_name == 'schedule' && contains(github.event.schedule, '0 */2 * * *') || github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'breaking'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run breaking news scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py --breaking

  pulse-test:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run test mode
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py --test

      - name: Upload test HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulse-test-html
          path: /tmp/pulse_test_brief.html
          retention-days: 3
